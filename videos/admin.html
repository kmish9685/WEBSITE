<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ViralTube | Admin Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f12;
            color: #fff;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: #e50914;
            margin-bottom: 0.5rem;
        }

        p {
            color: #999;
            margin-bottom: 2rem;
        }

        .box {
            background: #18181c;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #333;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #ddd;
        }

        input,
        select,
        button {
            box-sizing: border-box;
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            border: none;
            font-size: 1rem;
        }

        input,
        select {
            background: #2a2a30;
            color: #fff;
            border: 1px solid #444;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #e50914;
        }

        button {
            background: #e50914;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #b80710;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #status {
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 4px;
            display: none;
            font-weight: 500;
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10B981;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #EF4444;
        }

        .preview {
            margin-top: 1.5rem;
            display: none;
            background: #0f0f12;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .preview img {
            max-width: 100%;
            border-radius: 4px;
            border: 1px solid #444;
        }

        .preview h4 {
            margin: 0.75rem 0 0.5rem;
            font-size: 1.1rem;
        }

        .preview a {
            color: #e50914;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .preview a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h1>Admin Dashboard</h1>
    <p>Paste a link below. The server will invisibly scrape the thumbnail and title, and automatically inject it into
        the website database.</p>

    <div class="box">
        <form id="addForm">
            <label>Target Video / Affiliate URL</label>
            <input type="url" id="url" placeholder="https://vimeo.com/..." required>

            <label>Category</label>
            <select id="category" required>
                <option value="technology">Technology</option>
                <option value="gaming">Gaming</option>
                <option value="fitness">Fitness & Health</option>
            </select>

            <button type="submit" id="submitBtn">🔍 Scrape & Add Video</button>
        </form>

        <div id="status"></div>

        <div class="preview" id="preview">
            <h3>✅ Added Successfully!</h3>
            <img id="prevImg" src="">
            <h4 id="prevTitle"></h4>
            <a href="/index.html" target="_blank">View Live on Website &rarr;</a>
        </div>
    </div>

    <script>
        document.getElementById('addForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const preview = document.getElementById('preview');

            const url = document.getElementById('url').value;
            const category = document.getElementById('category').value;

            btn.textContent = 'Scraping... please wait';
            btn.disabled = true;
            status.style.display = 'none';
            preview.style.display = 'none';

            try {
                const response = await fetch('/api/add-video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, category })
                });

                const data = await response.json();

                if (data.success) {
                    status.className = 'success';
                    status.textContent = 'Video successfully added to data.js database!';
                    status.style.display = 'block';

                    document.getElementById('prevImg').src = data.video.thumbnail;
                    document.getElementById('prevTitle').textContent = data.video.title;
                    preview.style.display = 'block';

                    document.getElementById('url').value = ''; // Reset input
                } else {
                    throw new Error(data.error || "Failed to scrape");
                }
            } catch (err) {
                status.className = 'error';
                status.textContent = 'Error: ' + err.message;
                status.style.display = 'block';
            } finally {
                btn.textContent = '🔍 Scrape & Add Video';
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
